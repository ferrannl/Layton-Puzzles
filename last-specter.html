<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Layton's Puzzle Archive: Last Specter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-game-id="last-specter" data-game-title="Last Specter Puzzles" data-json-file="data/last-specter.json" data-impossible-file="data/last-specter-impossible.json">

  <header class="topbar">
    <div class="wrap topbarInner">
      <div class="topbarTitle">
        <h1 class="brand">Last Specter Puzzles</h1>
        <p class="sub">Browse puzzles, open hints, draw solutions, and track completion progress.</p>
      </div>
      <div class="controls">
        <input id="q" type="search" placeholder="Search by #number or title…" />
        <label class="chk">
          <input id="toggleAllSolutions" type="checkbox" />
          Auto-open Solutions
        </label>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div id="status" class="status">Initializing interactive puzzle grid...</div>
    <div id="list" class="list"></div>
  </main>

  <footer class="pager bottom" id="pagerBottom"></footer>

  <script type="module" src="javascript/script.js"></script>
</body>
</html>

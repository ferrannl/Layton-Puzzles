<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Layton Archive: Unwound Future</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body data-game-id="unwound-future" data-game-title="Unwound Future Puzzles" data-json-file="data/unwound-future.json" data-impossible-file="data/unwound-future-impossible.json">
  <header class="topbar">
    <div class="wrap topbarInner">
      <div class="topbarTitle">
        <h1 class="brand">Unwound Future Puzzles</h1>
        <p class="sub">
          Browse puzzles, open hints, and reveal the solutions.
          Draw on images and mark puzzles as solved when you’re done.
        </p>
      </div>

      <div class="controls">
        <input id="q" type="search" placeholder="Search by #number or title…" />
        <label class="chk">
          <input id="toggleAllSolutions" type="checkbox" />
          Auto-open Solutions
        </label>
      </div>
    </div>
  </header>

  <main class="wrap">
    <div id="status" class="status">Loading puzzles…</div>
    <div id="list" class="list"></div>
  </main>

  <div class="pager bottom" id="pagerBottom" aria-label="Page navigation bottom"></div>

  <script type="module" src="javascript/script.js"></script>
</body>
</html>
